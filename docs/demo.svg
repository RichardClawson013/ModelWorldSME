  <text x="430" y="23" text-anchor="middle" fill="#6c7086" font-size="12" font-family="JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, monospace>ModelWorldSME</text>
  <text id="L0" x="22" y="63" fill="#cdd6f4" font-size="13" xml:space="preserve">ModelWorldSME — Business Elicitation Interview</text>
  <line id="L1" x1="22" y1="78" x2="838" y2="78" stroke="#45475a" stroke-width="0.5"/>
  <text id="L2" x="22" y="101" fill="#cdd6f4" font-size="13" xml:space="preserve">Tell me about your business. What do you do, and what does a typical day</text>
  <text id="L3" x="22" y="120" fill="#cdd6f4" font-size="13" xml:space="preserve">look like for you?</text>
  <text id="L4" x="22" y="139" fill="#89dceb" font-size="13" xml:space="preserve">&gt; I run a small painting company. Five guys, mostly residential. My day</text>
  <text id="L5" x="22" y="158" fill="#89dceb" font-size="13" xml:space="preserve">  is quotes, chasing invoices, and making sure the right crew is on site.</text>
  <line id="L6" x1="22" y1="173" x2="838" y2="173" stroke="#45475a" stroke-width="0.5"/>
  <text id="L7" x="22" y="196" fill="#cdd6f4" font-size="13" xml:space="preserve">Your assistant needs a name — one you'll use consistently. This name is</text>
  <text id="L8" x="22" y="215" fill="#cdd6f4" font-size="13" xml:space="preserve">permanent: it will appear in emails, reports, and messages on your behalf.</text>
  <text id="L9" x="22" y="234" fill="#89dceb" font-size="13" xml:space="preserve">&gt; Nova</text>
  <line id="L10" x1="22" y1="249" x2="838" y2="249" stroke="#45475a" stroke-width="0.5"/>
  <text id="L11" x="22" y="272" fill="#cdd6f4" font-size="13" xml:space="preserve">Tell me about a day that didn't go well.</text>
  <text id="L12" x="22" y="291" fill="#89dceb" font-size="13" xml:space="preserve">&gt; Client called angry about an invoice I'd sent to the wrong email six weeks</text>
  <text id="L13" x="22" y="310" fill="#89dceb" font-size="13" xml:space="preserve">  ago. Two crews were waiting on a material order I'd forgotten to place.</text>
  <line id="L14" x1="22" y1="325" x2="838" y2="325" stroke="#45475a" stroke-width="0.5"/>
  <text id="L15" x="22" y="348" fill="#cdd6f4" font-size="13" xml:space="preserve">Walk me through that step by step — from when you first noticed something</text>
  <text id="L16" x="22" y="367" fill="#cdd6f4" font-size="13" xml:space="preserve">was off to how it ended.</text>
  <text id="L17" x="22" y="386" fill="#89dceb" font-size="13" xml:space="preserve">&gt; Checked my sent folder, saw the wrong address immediately. Resent it,</text>
  <text id="L18" x="22" y="405" fill="#89dceb" font-size="13" xml:space="preserve">  apologised, offered a small discount. Client paid within the hour.</text>
  <line id="L19" x1="22" y1="420" x2="838" y2="420" stroke="#45475a" stroke-width="0.5"/>
  <text id="L20" x="22" y="443" fill="#cdd6f4" font-size="13" xml:space="preserve">Let's talk about Create invoice. When that goes well, what does it look like?</text>
  <text id="L21" x="22" y="462" fill="#89dceb" font-size="13" xml:space="preserve">&gt; I send it the same day the job finishes. PDF to the client, copy to my folder.</text>
  <line id="L22" x1="22" y1="477" x2="838" y2="477" stroke="#45475a" stroke-width="0.5"/>
  <text id="L23" x="22" y="500" fill="#cdd6f4" font-size="13" xml:space="preserve">You said I send it the same day. Why does getting that right matter to you?</text>
  <text id="L24" x="22" y="519" fill="#89dceb" font-size="13" xml:space="preserve">&gt; Cash flow. If three invoices slip a week I'm covering wages out of my pocket.</text>
  <line id="L25" x1="22" y1="534" x2="838" y2="534" stroke="#45475a" stroke-width="0.5"/>
  <text id="L26" x="22" y="557" fill="#cdd6f4" font-size="13" xml:space="preserve">And why does cash flow matter — what's actually at stake if it slips?</text>
  <text id="L27" x="22" y="576" fill="#89dceb" font-size="13" xml:space="preserve">&gt; I've had to delay payroll once. Never again. That's the line.</text>
  <line id="L28" x1="22" y1="591" x2="838" y2="591" stroke="#45475a" stroke-width="0.5"/>
  <text id="L29" x="22" y="614" fill="#cdd6f4" font-size="13" xml:space="preserve">Last question: what should your assistant do without asking, and what should</text>
  <text id="L30" x="22" y="633" fill="#cdd6f4" font-size="13" xml:space="preserve">it always check with you first?</text>
  <text id="L31" x="22" y="652" fill="#89dceb" font-size="13" xml:space="preserve">&gt; Send reminders on its own. Quotes it can draft but I always review. Payroll</text>
  <text id="L32" x="22" y="671" fill="#89dceb" font-size="13" xml:space="preserve">  — never without me.</text>
  <line id="L33" x1="22" y1="686" x2="838" y2="686" stroke="#45475a" stroke-width="0.5"/>
  <text id="L34" x="22" y="709" fill="#a6e3a1" font-size="13" xml:space="preserve">Interview complete.  Tasks confirmed: 24  ·  Agent: Nova</text>
  <text id="L35" x="22" y="728" fill="#a6e3a1" font-size="13" xml:space="preserve">Outputs: worldmodel.json · agent_config.yaml · SOUL.md · report.html</text>
