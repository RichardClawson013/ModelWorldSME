<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Your agent doesn't know your business yet. One conversation fixes that. ModelWorldSME turns what's in your head into files your agent can actually use." />
  <title>ModelWorldSME — Tell us about your business. We'll build the rest.</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3a;
      --accent:    #5b8def;
      --accent-d:  #3a6fd8;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --q-bg:      #1e2236;
      --a-bg:      #2a3050;
      --success:   #22c55e;
      --warning:   #f59e0b;
      --danger:    #ef4444;
      --radius:    12px;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      padding: 16px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .logo { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.3px; }
    .logo span { color: var(--accent); }
    .badge {
      font-size: 0.7rem; background: var(--border); color: var(--muted);
      padding: 3px 8px; border-radius: 20px;
    }

    /* ── Progress bar ────────────────────────────────────────────── */
    #progress-wrap {
      background: var(--border); height: 3px; width: 100%; flex-shrink: 0;
    }
    #progress-bar {
      height: 3px; background: var(--accent);
      transition: width 0.4s ease; width: 0%;
    }

    /* ── Phase label ─────────────────────────────────────────────── */
    #phase-label {
      text-align: center; font-size: 0.72rem; color: var(--muted);
      padding: 8px 24px 0; letter-spacing: 0.5px; text-transform: uppercase;
      flex-shrink: 0;
    }

    /* ── Chat area ───────────────────────────────────────────────── */
    #chat {
      flex: 1; overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 16px;
    }

    .bubble {
      max-width: 680px; padding: 14px 18px;
      border-radius: var(--radius); line-height: 1.55; font-size: 0.95rem;
    }
    .bubble.q {
      background: var(--q-bg); border: 1px solid var(--border);
      align-self: flex-start; border-top-left-radius: 4px;
    }
    .bubble.a {
      background: var(--a-bg); border: 1px solid #3a4060;
      align-self: flex-end; border-top-right-radius: 4px;
      color: #c8d0e8;
    }

    /* ── Loading overlay ─────────────────────────────────────────── */
    #loading {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
      z-index: 100;
    }
    #loading.hidden { display: none; }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: var(--muted); font-size: 0.9rem; }

    /* ── Input area ──────────────────────────────────────────────── */
    #input-area {
      padding: 16px 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex; gap: 10px;
      flex-shrink: 0;
    }
    #user-input {
      flex: 1;
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px 16px; font-size: 0.95rem;
      resize: none; min-height: 48px; max-height: 140px;
      font-family: inherit;
    }
    #user-input:focus { outline: none; border-color: var(--accent); }
    #send-btn {
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius);
      padding: 0 22px; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
      white-space: nowrap;
    }
    #send-btn:hover { background: var(--accent-d); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Results panel ───────────────────────────────────────────── */
    #results {
      display: none;
      padding: 32px 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    #results.visible { display: block; }
    .results-title {
      font-size: 1.25rem; font-weight: 700; margin-bottom: 8px;
    }
    .results-sub {
      color: var(--muted); font-size: 0.875rem; margin-bottom: 24px;
    }
    .dl-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }
    .dl-btn {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 18px;
      color: var(--text); text-decoration: none;
      cursor: pointer; font-size: 0.875rem; font-weight: 500;
      transition: border-color 0.15s, background 0.15s;
    }
    .dl-btn:hover { border-color: var(--accent); background: var(--q-bg); }
    .dl-icon { font-size: 1.3rem; }
    .dl-info { display: flex; flex-direction: column; }
    .dl-name { font-weight: 600; }
    .dl-desc { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .stat-row {
      display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 24px;
    }
    .stat {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 20px;
    }
    .stat-num { font-size: 2rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

    /* ── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 600px) {
      #chat { padding: 16px; }
      .bubble { max-width: 100%; }
      #input-area { flex-direction: column; }
      #send-btn { padding: 12px; }
    }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading">
  <div class="spinner"></div>
  <p>Getting ready (2,986 tasks, 16,281 connections)…</p>
</div>

<!-- Header -->
<header>
  <div class="logo">Model<span>World</span>SME</div>
  <p style="font-size:0.75rem;color:var(--muted);margin-top:3px;">Your business, mapped. Your agent, grounded.</p>
  <span class="badge">Live interview · runs in your browser · no signup</span>
</header>

<!-- Progress -->
<div id="progress-wrap"><div id="progress-bar"></div></div>
<div id="phase-label">Starting interview…</div>

<!-- Chat -->
<div id="chat"></div>

<!-- Results (shown at end) -->
<div id="results">
  <div class="results-title">Done. Here's what we built from your conversation.</div>
  <div class="results-sub" id="results-sub"></div>
  <div class="stat-row" id="stats"></div>
  <div class="dl-grid" id="downloads"></div>
</div>

<!-- Input -->
<div id="input-area">
  <textarea id="user-input" rows="1" placeholder="Type your answer…" autofocus></textarea>
  <button id="send-btn">Send</button>
</div>

<script>
'use strict';

// ─────────────────────────────────────────────────────────────
// 1. SYNONYM TABLE  (mirrors matching.py)
// ─────────────────────────────────────────────────────────────
const SYNONYMS = {
  invoice:     ['factuur','billing','rekening','nota'],
  payment:     ['betaling','betalen','transfer','overschrijving'],
  customer:    ['klant','client','opdrachtgever','afnemer'],
  supplier:    ['leverancier','vendor','inkoop'],
  employee:    ['personeel','medewerker','staff','werknemer'],
  quote:       ['offerte','quotation','proposal','aanbieding'],
  contract:    ['overeenkomst','agreement'],
  planning:    ['schedule','agenda','rooster'],
  purchase:    ['inkoop','bestelling','order'],
  sales:       ['verkoop','omzet'],
  report:      ['rapport','rapportage','verslag','overzicht'],
  tax:         ['btw','vat','belasting','aangifte'],
  absence:     ['verzuim','sick','ziek','verlof'],
  project:     ['klus','opdracht','werk'],
  budget:      ['begroting','kosten','uitgaven'],
  website:     ['web','online','digitaal'],
  email:       ['mail','e-mail','bericht','correspondentie'],
  complaint:   ['klacht','klachten','bezwaar'],
  maintenance: ['onderhoud','reparatie','service'],
  delivery:    ['levering','bezorging','transport'],
};

function expandSynonyms(text) {
  const lower = text.toLowerCase();
  const extra = [];
  for (const [canonical, syns] of Object.entries(SYNONYMS)) {
    const hits = [canonical, ...syns];
    if (hits.some(h => lower.includes(h))) extra.push(...hits);
  }
  return lower + ' ' + extra.join(' ');
}

function extractTasks(narrative, tasks, topN = 12) {
  const expanded = expandSynonyms(narrative);
  const words = expanded.split(/\W+/).filter(w => w.length >= 4);
  const scores = {};
  for (const task of tasks) {
    const blob = expandSynonyms([
      task.name || '', task.name_en || '', task.description || '',
      (task.cause||{}).trigger || '', (task.cause||{}).business_need || '',
      (task.effect||{}).output || '',
      ...(task.state_inputs||[]), ...(task.state_outputs||[]),
    ].join(' '));
    let score = words.reduce((n, w) => n + (blob.includes(w) ? 1 : 0), 0);
    const prefix = (task.name||'').slice(0,10).toLowerCase();
    if (prefix && narrative.toLowerCase().includes(prefix)) score += 3;
    if (score > 0) scores[task.id] = score;
  }
  return Object.entries(scores)
    .sort((a, b) => b[1] - a[1])
    .slice(0, topN)
    .map(([id]) => tasks.find(t => t.id === id))
    .filter(Boolean);
}

// ─────────────────────────────────────────────────────────────
// 2. CDM  (mirrors cdm.py)
// ─────────────────────────────────────────────────────────────
const STRIP_LEAD = new Set(['i','we','so','well','it','that','on','there','yeah','the']);

function firstPhrase(text, maxWords = 7) {
  text = text.trim();
  const clause = text.split(/[,;.!?\n]/)[0].trim();
  let words = clause.split(/\s+/);
  if (words.length && STRIP_LEAD.has(words[0].toLowerCase())) words = words.slice(1);
  const result = words.slice(0, maxWords).join(' ');
  return result ? result.toLowerCase() : 'that situation';
}

function makeCdmProbes(incident) {
  const phrase = firstPhrase(incident);
  return [
    `Walk me through ${phrase} step by step — from when you first noticed something was off to how it ended.`,
    'At that moment, what was the first sign that told you this needed your attention?',
    "What did you need to know or decide that someone without your experience wouldn't have handled the same way?",
    "If you hadn't been there — or if things had gone slightly differently — what would have gone wrong?",
    'How did it end up, and if it happened again tomorrow, what would you do differently?',
  ];
}

// ─────────────────────────────────────────────────────────────
// 3. LADDERING  (mirrors laddering.py)
// ─────────────────────────────────────────────────────────────
const STRIP_LEAD2 = new Set(['i','we','so','well','it','that','because','yeah','the']);

function keyPhrase(text, maxWords = 8) {
  text = text.trim();
  const clause = text.split(/[,;.!?\n]/)[0].trim();
  let words = clause.split(/\s+/);
  if (words.length && STRIP_LEAD2.has(words[0].toLowerCase())) words = words.slice(1);
  const result = words.slice(0, maxWords).join(' ');
  return result ? result.toLowerCase() : 'that';
}

function makeLadderingQuestion(taskName, depth, prevAnswer = null) {
  if (depth === 0)
    return `Let's talk about ${taskName}. When that goes well, what does it actually look like in practice?`;
  if (depth === 1) {
    const phrase = prevAnswer ? keyPhrase(prevAnswer) : taskName;
    return `You said ${phrase}. Why does getting that right matter to you?`;
  }
  if (depth === 2) {
    const phrase = prevAnswer ? keyPhrase(prevAnswer) : 'that';
    return `And why does ${phrase} matter — what's actually at stake if it slips?`;
  }
  return null;
}

function makeExceptionQuestion(taskName, ladderingAnswer = null) {
  if (ladderingAnswer) {
    const phrase = keyPhrase(ladderingAnswer);
    return `You said ${phrase} is what matters. Tell me about a time ${taskName} didn't go that way — when it went wrong, or when you had to handle it completely differently than usual.`;
  }
  return `Tell me about a time ${taskName} went wrong, or a situation where you had to handle it completely differently than usual.`;
}

// ─────────────────────────────────────────────────────────────
// 4. DOMAIN QUESTIONS  (mirrors questions.py)
// ─────────────────────────────────────────────────────────────
const DOMAIN_LABELS = {
  'D-FIN': 'Finance & Administration',
  'D-SAL': 'Sales',
  'D-KLA': 'Customer Service',
  'D-MKT': 'Marketing',
  'D-HRM': 'People & HR',
  'D-OPS': 'Operations',
  'D-DEL': 'Logistics & Delivery',
  'D-ICT': 'IT & Systems',
  'D-LEG': 'Legal & Compliance',
  'D-STR': 'Strategy',
  'D-CUSTOM': 'Custom Tasks',
};

const DOMAIN_FOLLOWUPS = {
  'D-FIN': 'Walk me through how you handle that week to week — from when a job is done to when the money is in your account.',
  'D-SAL': 'How do new clients find you, and what happens from first contact to a signed deal?',
  'D-KLA': 'When a client reaches out with a question or complaint, what does that process look like from start to finish?',
  'D-MKT': 'What does your marketing actually look like in practice — day to day, week to week?',
  'D-HRM': 'Tell me about the people side of things — scheduling, tracking time, managing absence.',
  'D-OPS': 'What are the recurring tasks that just have to happen every week for the business to keep running?',
  'D-DEL': 'How does delivery or fulfillment work once a job is confirmed?',
  'D-ICT': 'What systems and tools do you rely on daily — and what breaks when they don\'t work?',
  'D-LEG': 'How do you keep track of the legal and regulatory side — contracts, permits, compliance?',
  'D-STR': 'How do you make bigger decisions — pricing, new services, growth — is that planned or more ad hoc?',
};

function makeDomainQuestion(domain, taskNames) {
  let intro;
  if (taskNames.length === 1)        intro = `You mentioned "${taskNames[0]}".`;
  else if (taskNames.length === 2)   intro = `You mentioned "${taskNames[0]}" and "${taskNames[1]}".`;
  else                               intro = `You mentioned "${taskNames[0]}", "${taskNames[1]}", and related things.`;
  const followup = DOMAIN_FOLLOWUPS[domain] || 'Tell me more about how that works in practice.';
  return `${intro} ${followup}`;
}

// ─────────────────────────────────────────────────────────────
// 5. AUTONOMY PARSING
// ─────────────────────────────────────────────────────────────
function parseAutonomy(answer) {
  const l = answer.toLowerCase();
  if (['independently','on its own','always','fine','go ahead'].some(s => l.includes(s))) return 'autonomous';
  if (['inform','let me know','after','report'].some(s => l.includes(s))) return 'notify';
  if (['never','always me','myself','i do'].some(s => l.includes(s))) return 'human_only';
  if (['ask','first','check','permission','approve'].some(s => l.includes(s))) return 'ask_first';
  return 'ask_first';
}

function parseThreshold(answer) {
  const m = answer.match(/[$€£]?\s*([\d,]+(?:\.\d+)?)\s*(?:euro|eur|dollar|usd|gbp)?/i);
  if (m) { const v = parseFloat(m[1].replace(',', '')); if (!isNaN(v)) return v; }
  return null;
}

// ─────────────────────────────────────────────────────────────
// 6. EXPORT FUNCTIONS
// ─────────────────────────────────────────────────────────────
function exportWorldmodelJson(model, confirmedIds) {
  const confirmed = new Set([...confirmedIds, ...(model._custom_tasks||[])]);
  const out = {
    ...model,
    schema_version: '1.5-custom',
    tasks: model.tasks.filter(t => confirmed.has(t.id)),
    notes: `Personalized model for ${model._meta?.company_name||'unknown'} — generated ${new Date().toISOString().slice(0,10)}`,
  };
  delete out._custom_tasks;
  return JSON.stringify(out, null, 2);
}

function exportAgentConfigYaml(model, confirmedIds) {
  const meta = model._meta || {};
  const agentName = meta.agent_name || 'assistant';
  const confirmed = model.tasks.filter(t => confirmedIds.has(t.id) || t.custom);
  const today = new Date().toISOString().slice(0,10);

  const lines = [
    '# Agent configuration — generated by ModelWorldSME',
    '# https://github.com/RichardClawson013/ModelWorldSME',
    '',
    'agent:',
    `  name: "${agentName}"`,
    '  name_permanent: true',
    '  name_appears_in_output: true',
    `  company: "${meta.company_name||''}"`,
    `  generated_on: "${today}"`,
    '  method: "CDM+Laddering+ExceptionProbing"',
    '',
    'autonomy:',
  ];

  for (const level of ['autonomous','notify','ask_first','human_only']) {
    const tasksAtLevel = confirmed
      .filter(t => (t.agent_profile||{}).automatable === level)
      .map(t => t.name || t.id)
      .slice(0, 10);
    if (tasksAtLevel.length) {
      lines.push(`  ${level}:`);
      tasksAtLevel.forEach(name => lines.push(`    - "${name}"`));
    }
  }

  lines.push('', 'escalation:');
  for (const t of confirmed) {
    for (const trigger of (t.agent_profile||{}).escalation_triggers||[]) {
      lines.push(`  - task: "${t.name||t.id}"`);
      lines.push(`    trigger: "${trigger}"`);
    }
  }

  lines.push('', 'domains_active:');
  const domains = [...new Set(confirmed.map(t => t.domain||'?'))].sort();
  for (const d of domains) lines.push(`  - ${d}  # ${DOMAIN_LABELS[d]||d}`);

  return lines.join('\n') + '\n';
}

function cleanName(name) {
  return (name || '').replace(/\s*\(\d+\)\s*$/, '').trim();
}

function exportSoulMd(model, confirmedIds) {
  const meta        = model._meta || {};
  const agentName   = meta.agent_name   || 'assistant';
  const company     = meta.company_name || 'this business';
  const owner       = meta.owner_name   || 'the owner';
  const generated   = meta.generated_on || new Date().toISOString().slice(0,10);
  const description = meta.description  || '';

  const confirmed = (model.tasks || []).filter(t =>
    (confirmedIds && confirmedIds.has(t.id)) || t.custom
  );

  // ── Laddering knowledge ────────────────────────────────────────────────
  const ladderTasks   = confirmed.filter(t => t._custom && t._custom.laddering_answers && t._custom.laddering_answers.length);
  const exceptionTasks = confirmed.filter(t => t._custom && t._custom.exception);

  const practiceLines     = [];
  const consequenceLines  = [];
  const valueLines        = [];
  for (const t of ladderTasks) {
    const answers = t._custom.laddering_answers;
    if (answers[0]) practiceLines.push(`- *"${answers[0]}"*`);
    if (answers[1]) consequenceLines.push(`- *"${answers[1]}"* — on **${cleanName(t.name)}**`);
    if (answers[2]) valueLines.push(`- *"${answers[2]}"*`);
  }
  const exceptionLines = exceptionTasks.map(t =>
    `- **${cleanName(t.name)}**: *"${t._custom.exception}"*`
  );

  // ── Autonomy tiers ─────────────────────────────────────────────────────
  const autonomous = confirmed.filter(t => (t.agent_profile||{}).automatable === 'autonomous').map(t => cleanName(t.name));
  const askFirst   = confirmed.filter(t => (t.agent_profile||{}).automatable === 'ask_first').map(t => cleanName(t.name));
  const humanOnly  = confirmed.filter(t => (t.agent_profile||{}).automatable === 'human_only').map(t => cleanName(t.name));

  // ── Escalation & guardrails ────────────────────────────────────────────
  const seenTriggers = new Set();
  const escalationLines = [];
  for (const t of confirmed) {
    for (const tr of (t.agent_profile||{}).escalation_triggers||[]) {
      if (!seenTriggers.has(tr)) { seenTriggers.add(tr); escalationLines.push(`- ${tr}`); }
    }
  }
  const seenGuards = new Set();
  const guardrailLines = [];
  for (const t of confirmed) {
    for (const g of (t.agent_profile||{}).guardrails||[]) {
      if (!seenGuards.has(g) && !g.startsWith('Threshold:')) {
        seenGuards.add(g); guardrailLines.push(`- ${g}`);
      }
    }
  }

  // ── Render helpers ─────────────────────────────────────────────────────
  const fmt = (lines, fallback) => lines.slice(0,12).join('\n') || fallback;
  const fmtBullet = (items, fallback) => items.slice(0,12).map(i => `- ${i}`).join('\n') || fallback;

  const identityQuote = description ? `\n\n> *"${description}"*` : '';

  return `# SOUL — ${agentName}

> Identity layer for **${agentName}**, generated on ${generated} from a live interview.
> Grounded in CDM + Laddering + Exception Probing (Klein 1989; Kelly 1955; Beyer & Holtzblatt 1997).
> Inject this file as system context at the start of every session. Do not summarise it.

---

## 1. Identity${identityQuote}

My name is **${agentName}**. This name is permanent — it appears in every email, report,
and message I send. I work for **${company}**.

I was built from a conversation, not a template. Every rule in this document came from
${owner}'s own words. I act as ${owner} would act — within the limits ${owner} set.

---

## 2. What good work looks like

These are the owner's own descriptions of how recurring tasks go well.
They define the standard I hold myself to.

${fmt(practiceLines, '- Not yet recorded.')}

---

## 3. Why it matters — consequences

What ${owner} said about what goes wrong when these tasks slip:

${fmt(consequenceLines, '- Not yet recorded.')}

---

## 4. What is actually at stake — values

The deepest reason ${owner} cares about getting this right:

${fmt(valueLines, '- Not yet recorded.')}

---

## 5. Autonomy — what I can handle alone

I act on these without checking first. The owner has explicitly approved autonomous execution.

${fmtBullet(autonomous, '- None confirmed.')}

---

## 6. Autonomy — what I always check first

I prepare, draft, or flag — but I do not execute until ${owner} confirms.

${fmtBullet(askFirst, '- None confirmed.')}

---

## 7. Hard limits — what I never do without ${owner}

These are non-negotiable. No override, no exception, no matter the urgency.

${fmtBullet(humanOnly, '- None specified.')}

---

## 8. Escalation rules

${fmt(escalationLines.slice(0,8), '- None specified.')}

When I escalate, I state:
1. What I was about to do
2. What stopped me
3. What I need from ${owner}
4. By when (if time-sensitive)

I do not improvise past a hard limit. I wait.

---

## 9. Operating guardrails

${fmt(guardrailLines.slice(0,8), '- None specified.')}

---

## 10. Failure protocol

These are situations ${owner} described where things went wrong.
They define how I recognise a broken pattern — and what I do.

${fmt(exceptionLines, '- None recorded yet.')}

When I encounter a situation that matches a known failure pattern:
- I stop the automated action
- I notify ${owner} with the specific pattern I recognised
- I do not attempt to resolve it alone unless explicitly covered above

---

## 11. Communication style

- I am direct. I do not pad responses with pleasantries before the point.
- I sign everything as **${agentName}**.
- I write in the register appropriate to the recipient — formal for clients, plain for internal.
- When I ask a question, I ask one question. Not three.
- I state what I did, what I decided, and what I need — in that order.
- I never pretend certainty I do not have.

---

## 12. Memory anchors

Facts I carry across every session — regardless of conversation history:

- Agent name: **${agentName}** (permanent, appears in all output)
- Business: **${company}**
- Owner: **${owner}**

// ─────────────────────────────────────────────────────────────
// 8. INTERVIEW STATE MACHINE
// ─────────────────────────────────────────────────────────────
class InterviewFlow {
  constructor(model) {
    this.model = model;
    this.confirmedIds = new Set();
    this.insights = {};
    this.narrativeParts = [];
    this.meta = {};

    this.phase = 'intro';

    // CDM
    this.incident = '';
    this.cdmProbes = [];
    this.cdmIndex = 0;

    // Domain confirm
    this.domainQueue = [];

    // Laddering
    this.ladderQueue = [];
    this.ladderTask = null;
    this.ladderDepth = 0;
    this.ladderLastAnswer = '';
    this.inException = false;
  }

  get done() { return this.phase === 'done'; }

  next(answer = null) {
    if (answer !== null) this._ingest(answer);
    return this._emit();
  }

  _ingest(answer) {
    this.narrativeParts.push(answer);
    this._runMatching();

    switch (this.phase) {
      case 'intro':
        this.meta.description = answer;
        this.phase = 'agent_name';
        break;

      case 'agent_name':
        this.meta.agent_name = (answer.trim().split(/\s+/)[0] || 'assistant');
        this.model._meta = { ...this.model._meta, ...this.meta };
        this.phase = 'cdm_incident';
        break;

      case 'cdm_incident':
        this.incident = answer;
        this.cdmProbes = makeCdmProbes(answer);
        this.cdmIndex = 0;
        this.phase = 'cdm_probes';
        break;

      case 'cdm_probes':
        this.cdmIndex++;
        if (this.cdmIndex >= this.cdmProbes.length) {
          this._prepareDomainQueue();
          this.phase = this.domainQueue.length ? 'domain_confirm' : 'laddering';
          if (this.phase === 'laddering') this._prepareLadderQueue();
        }
        break;

      case 'domain_confirm':
        if (this.domainQueue.length) this.domainQueue.shift();
        if (!this.domainQueue.length) {
          this._prepareLadderQueue();
          this.phase = this.ladderQueue.length ? 'laddering' : 'custom';
          if (this.phase === 'laddering') this._startNextLadderTask();
        }
        break;

      case 'laddering':
        this._processLadderAnswer(answer);
        break;

      case 'custom':
        if (answer.trim().length > 5) this._addCustomTask(answer.trim());
        this.phase = 'autonomy';
        break;

      case 'autonomy':
        this._processGlobalAutonomy(answer);
        this.phase = 'done';
        break;
    }
  }

  _emit() {
    switch (this.phase) {
      case 'intro':
        return 'Tell me about your business. What do you do, and what does a typical day look like for you?';

      case 'agent_name':
        return "Your assistant needs a name — one you'll use consistently. This name is permanent: it will appear in emails, reports, and messages sent on your behalf. What would you like to call your assistant?";

      case 'cdm_incident':
        return "Tell me about a day that didn't go well — not necessarily the worst, just a day when things piled up or something slipped through.";

      case 'cdm_probes':
        return this.cdmIndex < this.cdmProbes.length ? this.cdmProbes[this.cdmIndex] : null;

      case 'domain_confirm':
        if (!this.domainQueue.length) return null;
        const [domain, taskNames] = this.domainQueue[0];
        return makeDomainQuestion(domain, taskNames);

      case 'laddering':
        return this._makeLadderQuestion();

      case 'custom':
        return "Is there anything you do regularly that we haven't talked about yet?";

      case 'autonomy':
        return "Last question: if your assistant could handle things on its own — what would you want it to do without asking, and what should it always check with you first?";

      default:
        return null;
    }
  }

  _runMatching() {
    const full = this.narrativeParts.join(' ');
    const matched = extractTasks(full, this.model.tasks || []);
    matched.forEach(t => this.confirmedIds.add(t.id));
  }

  _prepareDomainQueue() {
    const taskMap = {};
    (this.model.tasks || []).forEach(t => taskMap[t.id] = t);
    const domains = {};
    for (const tid of this.confirmedIds) {
      const task = taskMap[tid];
      if (!task) continue;
      const domain = task.domain || '';
      const name   = task.name_en || task.name || '';
      if (domain && name && DOMAIN_FOLLOWUPS[domain]) {
        domains[domain] = domains[domain] || [];
        domains[domain].push(name);
      }
    }
    this.domainQueue = Object.entries(domains)
      .filter(([, names]) => names.length >= 2)
      .slice(0, 4);
  }

  _prepareLadderQueue() {
    const taskMap = {};
    (this.model.tasks || []).forEach(t => taskMap[t.id] = t);
    const riskOrder = ['critical','high','medium','low'];
    const candidates = [...this.confirmedIds]
      .map(id => taskMap[id])
      .filter(Boolean)
      .sort((a, b) => {
        const ra = riskOrder.indexOf((a.failure||{}).risk_level||'low');
        const rb = riskOrder.indexOf((b.failure||{}).risk_level||'low');
        return (ra === -1 ? 3 : ra) - (rb === -1 ? 3 : rb);
      });
    this.ladderQueue = candidates.slice(0, 3);
  }

  _startNextLadderTask() {
    this.ladderTask = this.ladderQueue.shift();
    this.ladderDepth = 0;
    this.ladderLastAnswer = '';
    this.inException = false;
  }

  _makeLadderQuestion() {
    if (!this.ladderTask) return null;
    const name = this.ladderTask.name_en || this.ladderTask.name || '';
    if (this.inException)
      return makeExceptionQuestion(name, this.ladderLastAnswer || null);
    return makeLadderingQuestion(name, this.ladderDepth, this.ladderLastAnswer || null);
  }

  _processLadderAnswer(answer) {
    if (!this.ladderTask) { this.phase = 'custom'; return; }
    const ins = this.insights[this.ladderTask.id] = this.insights[this.ladderTask.id] || {};

    if (this.inException) {
      ins.exception = answer;
      if (this.ladderTask.failure) this.ladderTask.failure.failure_mode = answer;
      if (this.ladderQueue.length) {
        this._startNextLadderTask();
      } else {
        this.phase = 'custom';
      }
    } else {
      (ins.laddering = ins.laddering || []).push(answer);
      this.ladderLastAnswer = answer;
      this.ladderDepth++;
      if (this.ladderDepth >= 3) this.inException = true;
    }
  }

  _processGlobalAutonomy(answer) {
    const level = parseAutonomy(answer);
    const threshold = parseThreshold(answer);
    const taskMap = {};
    (this.model.tasks || []).forEach(t => taskMap[t.id] = t);
    for (const tid of this.confirmedIds) {
      const task = taskMap[tid];
      if (!task) continue;
      const ins = this.insights[tid] = this.insights[tid] || {};
      if (!ins.autonomy) ins.autonomy = level;
      task.agent_profile = task.agent_profile || {};
      task.agent_profile.automatable = ins.autonomy;
      if (threshold) {
        task.agent_profile.escalation_triggers = task.agent_profile.escalation_triggers || [];
        task.agent_profile.escalation_triggers.push(`Amount above ${threshold}`);
      }
    }
  }

  _addCustomTask(description) {
    const tasks = this.model.tasks = this.model.tasks || [];
    const custom = this.model._custom_tasks = this.model._custom_tasks || [];
    const id = `T-CUSTOM-${String(custom.length + 1).padStart(4, '0')}`;
    const task = {
      id, name: description.slice(0, 80), description,
      domain: 'D-CUSTOM', custom: true,
      agent_profile: { automatable: 'ask_first', guardrails: [], escalation_triggers: [] },
      cause: { upstream_tasks: [] }, effect: { downstream_tasks: [] },
      failure: { risk_level: 'medium' },
    };
    tasks.push(task);
    custom.push(id);
    this.confirmedIds.add(id);
  }

  _applyInsightsToModel() {
    const taskMap = {};
    (this.model.tasks || []).forEach(t => taskMap[t.id] = t);
    for (const [tid, ins] of Object.entries(this.insights)) {
      const task = taskMap[tid];
      if (!task) continue;
      task._custom = task._custom || {};
      if (ins.laddering && ins.laddering.length) task._custom.laddering_answers = ins.laddering;
      if (ins.exception) task._custom.exception = ins.exception;
    }
  }

  export() {
    this._applyInsightsToModel();
    this.model._meta = { ...this.model._meta, ...this.meta,
      generated_on: new Date().toISOString().slice(0,10),
      tool_version: 'ModelWorldSME-1.0',
      method: 'CDM+Laddering+ExceptionProbing',
    };
    return {
      worldmodel_json:    exportWorldmodelJson(this.model, this.confirmedIds),
      agent_config_yaml:  exportAgentConfigYaml(this.model, this.confirmedIds),
      soul_md:            exportSoulMd(this.model, this.confirmedIds),
      html_report:        buildReport(this.model, this.confirmedIds),
      agent_name:         this.meta.agent_name || 'assistant',
      total_active:       this.confirmedIds.size,
    };
  }
}

  domain_confirm: 52,

const chat     = document.getElementById('chat');
const input    = document.getElementById('user-input');
const sendBtn  = document.getElementById('send-btn');
const progress = document.getElementById('progress-bar');
const phaseEl  = document.getElementById('phase-label');
const loading  = document.getElementById('loading');

let flow = null;

function addBubble(text, type) {
  const div = document.createElement('div');
  div.className = `bubble ${type}`;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function updateProgress(phase) {
  progress.style.width = (PHASE_PROGRESS[phase] || 0) + '%';
  phaseEl.textContent  = PHASE_LABELS[phase]  || '';
}

function showQuestion(q) {
  addBubble(q, 'q');
  input.disabled  = false;
  sendBtn.disabled = false;
  input.focus();
}

function handleSend() {
  const answer = input.value.trim();
  if (!answer || !flow) return;
  input.value = '';
  input.style.height = 'auto';
  input.disabled  = true;
  sendBtn.disabled = true;

  addBubble(answer, 'a');

  const next = flow.next(answer);
  updateProgress(flow.phase);

  if (next) {
    showQuestion(next);
  } else {
    finishInterview();
  }
}

function finishInterview() {
  input.disabled  = true;
  sendBtn.disabled = true;
  document.getElementById('input-area').style.display = 'none';

  const result = flow.export();

  // Stats
  const statsEl = document.getElementById('stats');
  statsEl.innerHTML = `
    <div class="stat"><div class="stat-num">${result.total_active}</div><div class="stat-label">Tasks mapped to your business</div></div>
    <div class="stat"><div class="stat-num">${result.agent_name}</div><div class="stat-label">Your agent's name</div></div>
  `;

  document.getElementById('results-sub').textContent =
    `Done. Here's what we built from your conversation.`;

  // Downloads
  const dlGrid = document.getElementById('downloads');
  const files = [
    {
      name: `worldmodel_${result.agent_name}.json`,
      content: result.worldmodel_json,
      mime: 'application/json',
      icon: '🗺️',
      label: 'World Model',
      desc: 'Confirmed tasks (JSON)',
    },
    {
      name: `agent_config_${result.agent_name}.yaml`,
      content: result.agent_config_yaml,
      mime: 'text/yaml',
      icon: '⚙️',
      label: 'Agent Config',
      desc: 'Autonomy & escalation (YAML)',
    },
    {
      name: `SOUL_${result.agent_name}.md`,
      content: result.soul_md,
      mime: 'text/markdown',
      icon: '✨',
      label: 'SOUL',
      desc: 'Who the agent is — 12 sections from your own words (Markdown)',
    },
    {
      name: `report_${result.agent_name}.html`,
      content: result.html_report,
      mime: 'text/html',
      icon: '📊',
      label: 'Analysis Report',
      desc: 'Risks & opportunities (HTML→PDF)',
    },
  ];

  for (const f of files) {
    const blob = new Blob([f.content], { type: f.mime });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = f.name;
    a.className = 'dl-btn';
    a.innerHTML = `
      <span class="dl-icon">${f.icon}</span>
      <span class="dl-info">
        <span class="dl-name">${f.label}</span>
        <span class="dl-desc">${f.desc}</span>
      </span>`;
    dlGrid.appendChild(a);
  }

  document.getElementById('results').classList.add('visible');
  chat.scrollTop = chat.scrollHeight;
}

// Send on Enter (Shift+Enter = newline)
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});
sendBtn.addEventListener('click', handleSend);

// ─────────────────────────────────────────────────────────────
// 11. BOOT — fetch worldmodel then start
// ─────────────────────────────────────────────────────────────
const WORLDMODEL_URL =
  'https://raw.githubusercontent.com/RichardClawson013/ModelWorldSME/main/worldmodel/sme_worldmodel_v1.5.json';

async function boot() {
  try {
    const resp = await fetch(WORLDMODEL_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const model = await resp.json();

    loading.classList.add('hidden');
    flow = new InterviewFlow(model);

    const firstQ = flow.next();
    updateProgress(flow.phase);
    showQuestion(firstQ);
  } catch (err) {
    loading.innerHTML = `
      <p style="color:#ef4444;font-weight:600">Could not load knowledge base</p>
      <p style="color:#6b7280;font-size:0.875rem;margin-top:8px">${err.message}</p>
      <p style="color:#6b7280;font-size:0.8rem;margin-top:16px">
        Run locally: <code>python examples/terminal_example.py</code>
      </p>`;
  }
}

boot();
</script>
