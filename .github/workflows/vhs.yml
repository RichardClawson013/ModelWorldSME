name: Generate demo GIF

on:
  push:
    branches: [main]
    paths:
      - examples/demo_run.py
      - demo.tape
  workflow_dispatch:

jobs:
  vhs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e . -q

      - name: Install VHS dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg xvfb fonts-noto-color-emoji

      - name: Install VHS binary
        run: |
          VHS_VERSION="0.7.2"
          wget -q "https://github.com/charmbracelet/vhs/releases/download/v${VHS_VERSION}/vhs_${VHS_VERSION}_Linux_x86_64.tar.gz"
          tar -xzf "vhs_${VHS_VERSION}_Linux_x86_64.tar.gz"
          sudo mv vhs /usr/local/bin/vhs
          vhs --version

      - name: Install ttyd (VHS terminal backend)
        run: |
          wget -q "https://github.com/tsl0922/ttyd/releases/download/1.7.4/ttyd.x86_64" -O ttyd
          chmod +x ttyd
          sudo mv ttyd /usr/local/bin/ttyd

      - name: Generate GIF
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          export DISPLAY=:99
          mkdir -p docs
          vhs demo.tape
        timeout-minutes: 3

      - name: Commit GIF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update demo GIF [skip ci]"
          file_pattern: docs/demo.gif
