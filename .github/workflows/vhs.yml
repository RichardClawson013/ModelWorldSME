name: Update demo SVG

on:
  push:
    branches: [main]
    paths:
      - scripts/generate_demo_svg.py
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate SVG
        run: python scripts/generate_demo_svg.py

      - name: Commit SVG
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update demo SVG [skip ci]"
          file_pattern: docs/demo.svg
