name: Generate demo SVG

on:
  push:
    branches: [main]
    paths:
      - examples/demo_run.py
      - demo.tape
      - .github/workflows/vhs.yml
  workflow_dispatch:

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e . -q
          pip install termtosvg -q

      - name: Record demo as animated SVG
        run: |
          mkdir -p docs
          termtosvg docs/demo.svg \
            --command "python examples/demo_run.py" \
            --template window_frame \
            --width 100 \
            --min-frame-duration 0.05
        timeout-minutes: 2

      - name: Commit SVG
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update demo SVG [skip ci]"
          file_pattern: docs/demo.svg
